<!doctype html>
<html>
<head>
 <script type="text/javascript" src="https://wybiral.github.io/code-art/projects/tiny-mirror/index.js"></script>
 <link rel="stylesheet" type="text/css" href="https://wybiral.github.io/code-art/projects/tiny-mirror/index.css">
 <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
</head>
<body>
 <div class="video-wrap">
 <video id="video" playsinline autoplay></video>
 </div>
 <canvas id="canvas" width="640" height="480"></canvas>

 <script>
 'use strict';

 const video = document.getElementById('video');
 const canvas = document.getElementById('canvas');
 const errorMsgElement = document.querySelector('span#errorMsg');

 const constraints = {
 audio: false,
 video: {
 facingMode: "user",
 width: 1280,
 height: 720
 }
 };

 // Access webcam
 async function init() {
 try {
 const stream = await navigator.mediaDevices.getUserMedia(constraints);
 handleSuccess(stream);
 } catch (e) {
 errorMsgElement.innerHTML = `navigator.getUserMedia error: ${e.toString()}`;
 }
 }

 // Success function
 function handleSuccess(stream) {
 window.stream = stream;
 video.srcObject = stream;

 const context = canvas.getContext('2d');

 function captureFrame() {
 context.drawImage(video, 0, 0, 640, 480);

 const canvasData = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");

 // Simulate YouTube live stream upload
 uploadToYouTube(canvasData);
 }

 // Capture frames at a higher rate
 const captureInterval = setInterval(captureFrame, 100); // 10 frames per second

 // Stop capturing when the stream ends
 stream.getVideoTracks()[0].onended = () => {
 clearInterval(captureInterval);
 };
 }

 // Function to simulate uploading frames to YouTube
 function uploadToYouTube(frameData) {
 // Simulate network delay
 setTimeout(() => {
 // Here you would typically send the frame data to your server
 // and let your server handle the upload to YouTube

 console.log("Frame uploaded to YouTube server");
 }, 50); // Simulate network delay of 50 milliseconds
 }

 // Load init
 init();
 </script>

 <iframe id="Live_YT_TV" width="100%" height="500px" src="https://www.youtube.com/embed/live_yt_tv?autoplay=1" frameborder="0" allow="autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</body>
</html>
